# version removed (obsolete)

services:
  backend:
    build: ./backend
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/portfolio.db
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  

  nginx:
    build: ./frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
